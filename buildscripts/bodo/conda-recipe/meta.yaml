package:
  name: bodo
  version: {{ BODO_VERSION }}

source:
   path: ../../..

build:
  number: {{ GIT_DESCRIBE_NUMBER|int }}
  string: "py{{ PY_VER }}h{{ PKG_HASH }}_{{ PKG_BUILDNUM }}_{{ 'cuda' if gpu == 'true' else 'cpu' }}"
  script_env:
    - IS_BODO_PLATFORM
    - BUILD_WITH_V8
    # Necessary for sccache to find AWS
    - AWS_ACCESS_KEY_ID
    - AWS_SECRET_ACCESS_KEY
    # Flag for disabling sccache in the build environment
    - DISABLE_SCCACHE_IN_BUILD
  rpaths:
    - lib
    - {{ PREFIX }}/lib
    - {{ SP_DIR }}/pyarrow

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - sccache
    - mold  # [linux]
    - cmake <4.0,>=3.23
    - make
    - ninja
    - {{ compiler('cuda') }}  # [gpu]

  host:
    - python
    - pip

    # Build Dependencies
    - setuptools >=64
    - cython >=3.0
    - setuptools_scm >=8
    - scikit-build-core
    - mpi4py >=4.0
    - numba >=0.62,<0.64
    # Compatible with Numba requirements.
    # Resolves build issues on nightly
    - numpy >=1.24
    - libarrow =23.0
    - pyarrow =23.0
    - libboost-headers          # [not win]
    - libboost-devel            # [win]
    # Corresponding dependency is automatically added in reqs/run.
    - aws-sdk-cpp
    - zstd

    - hdf5 * *mpi_mpich_*       # [not gpu and linux]
    - hdf5 * *mpi_openmpi_*     # [gpu or osx]
    - hdf5 * *mpi_impi_*        # [not gpu and win]
    - h5py

    - mpich                 # [not gpu and linux]
    - openmpi               # [gpu or osx]
    - impi-devel            # [not gpu and win]

    # GPU dependencies
    # This pin is necessary to avoid compatibility issues with 26.02
    # and newer versions.
    - cudf =26.04                  # [gpu]
    - rmm =26.04                   # [gpu]
    - librmm =26.04                # [gpu]
    - cuda-version 13.*            # [gpu]

  run:
    - python
    - {{ pin_compatible('numpy') }}
    - pandas >=2.2
    - fsspec >=2021.09
    - mpi4py >=4.0
    - pyarrow 23.0.*
    - numba >=0.62,<0.64

    - mpich                 # [not gpu and linux]
    - openmpi               # [gpu or osx]
    - impi_rt               # [not gpu and win]

    - requests
    - zstd
    - cloudpickle >=3.0
    - psutil
    - pytz

    # GPU dependencies
    - cudf =26.04                  # [gpu]
    - rmm =26.04                   # [gpu]
    - librmm =26.04                # [gpu]
    - cuda-version 13.*            # [gpu]

    - {{ pin_compatible("cuda-version") }}  # [gpu]

  # run_constrained means these packages are not required deps
  # but will restrict them if they are present in the conda env.
  run_constrained:
    - numpy >=1.24
    - s3fs >=2022.1.0
    - adlfs >=2022.1.0
    - pyiceberg >=0.10

test:
  imports:
    - bodo
  source_files:
    - examples/Misc/misc_pi.py

about:
  home: https://bodo.ai
  license: Apache-2.0
  license_file: LICENSE
  summary: High-Performance Python Compute Engine for Data and AI
